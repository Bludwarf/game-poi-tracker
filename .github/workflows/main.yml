name: Deploy
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11 # TODO il faudrait pouvoir réutiliser la version déjà utilisée par le devcontainer ou bien ajouter une étape avec corepack pour ajouter "packageManager" dans le package.json
      - run: pnpm run deploy
permissions:
  contents: write # Allow write permission to GITHUB_TOKEN to commit to deploy branch.
